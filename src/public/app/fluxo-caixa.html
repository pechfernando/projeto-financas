<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plano. — Fluxo de Caixa</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
    <header>
        <h1>plano.</h1>
        <nav>
            <a href="/app/">Lançamentos</a>
            <a href="/app/relatorio.html">Relatório Mensal</a>
            <a href="/app/orcamento.html">Orçamento</a>
            <a href="/app/fluxo-caixa.html" class="ativo">Fluxo de Caixa</a>
            <a href="/app/investimentos.html">Investimentos</a>
            <a href="/app/patrimonio.html">Patrimônio</a>
            <a href="/app/rendimentos.html">Rendimentos</a>
        </nav>
    </header>

    <main>
        <section class="card">
            <div class="seletor-periodo">
                <div class="campo">
                    <label for="mes">Até o mês</label>
                    <select id="mes"></select>
                </div>
                <div class="campo">
                    <label for="ano">Ano</label>
                    <select id="ano"></select>
                </div>
            </div>
        </section>

        <section class="card" id="card-folego">
            <h2>Fôlego Financeiro</h2>
            <p id="texto-folego">Carregando...</p>
        </section>

        <section class="card">
            <h2>Evolução do Saldo Acumulado</h2>
            <div class="container-grafico container-grafico-linha">
                <canvas id="grafico-saldo"></canvas>
            </div>
        </section>

        <section class="card">
            <h2>Detalhe por Mês</h2>
            <table id="tabela-fluxo">
                <thead>
                    <tr>
                        <th>Mês</th>
                        <th>Saldo do Mês</th>
                        <th>Saldo Acumulado</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-fluxo">
                    <tr><td colspan="3">Carregando...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="fluxo-caixa.js"></script>
</body>
</html>
